      color: #e1e4e8;

    }
    .header {
      background: linear-gradient(135deg, #1a1e2e 0%, #2d1f3d 100%);
      border-bottom: 1px solid #2a2e3a;
      padding: 2rem 2rem 1.5rem;
      text-align: center;
    }
    .header h1 {
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      background: linear-gradient(90deg, #58a6ff, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .header p {
      color: #8b949e;
      font-size: 0.95rem;
    }
    .controls {
      display: flex;
      justify-content: center;
      gap: 0.75rem;
      padding: 1.25rem 2rem;
      background: #161822;
      border-bottom: 1px solid #2a2e3a;
      flex-wrap: wrap;
    }
    .search-box {
      padding: 0.5rem 1rem;
      border-radius: 8px;
      border: 1px solid #2a2e3a;
      background: #1c1f2e;
      color: #e1e4e8;
      font-size: 0.9rem;
      width: 300px;
      outline: none;
      transition: border-color 0.2s;
    }
    .search-box:focus { border-color: #58a6ff; }
    .count-badge {
      display: inline-flex;
      align-items: center;
      padding: 0.5rem 1rem;
      border-radius: 8px;
      background: #1c1f2e;
      border: 1px solid #2a2e3a;
      color: #8b949e;
      font-size: 0.85rem;
    }
    .count-badge strong { color: #58a6ff; margin-right: 0.3rem; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(500px, 1fr));
      gap: 1.25rem;
      padding: 1.5rem 2rem 3rem;
      max-width: 1600px;
      margin: 0 auto;
    }
    .card {
      background: #161822;
      border: 1px solid #2a2e3a;
      border-radius: 12px;
      overflow: hidden;
      transition: border-color 0.2s, transform 0.15s;
    }
    .card:hover {
      border-color: #58a6ff;
      transform: translateY(-2px);
    }
    .card-img-wrap {
      position: relative;
      background: #1c1f2e;
      aspect-ratio: 4.5 / 1;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card-img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .card-img-wrap .placeholder {
      color: #484d58;
      font-size: 0.85rem;
    }
    .card-info {
      padding: 0.85rem 1rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .call-letters {
      display: inline-block;
      background: #58a6ff20;
      color: #58a6ff;
      font-weight: 700;
      font-size: 0.8rem;
      padding: 0.25rem 0.6rem;
      border-radius: 6px;
      white-space: nowrap;
      letter-spacing: 0.02em;
    }
    .call-letters.unknown {
      background: #f8514920;
      color: #f85149;
    }
    .title {
      font-size: 0.9rem;
      color: #c9d1d9;
      flex: 1;
    }
    .ids {
      font-size: 0.75rem;
      color: #484d58;
      white-space: nowrap;
    }
    @media (max-width: 600px) {
      .grid { grid-template-columns: 1fr; padding: 1rem; }
      .header h1 { font-size: 1.3rem; }
      .search-box { width: 100%; }
    }
  </style>
